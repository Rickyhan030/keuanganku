
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance App Premium</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<button id="installBtn" style="display:none;margin-bottom:15px;background:#22c55e;">
📲 Install Aplikasi
</button>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header h1{
font-size:28px;
font-weight:700;
}

.profile{
width:45px;
height:45px;
border-radius:50%;
background:linear-gradient(135deg,#22c55e,#16a34a);
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.balance-card{
background:linear-gradient(135deg,#22c55e,#15803d);
padding:25px;
border-radius:28px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(34,197,94,.35);
}

.balance-card p{
opacity:.8;
font-size:14px;
}

.balance-card h2{
font-size:38px;
margin-top:10px;
font-weight:700;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:20px;
}

.stat{
background:#1e293b;
padding:18px;
border-radius:22px;
}

.stat small{
color:#94a3b8;
}

.stat h3{
margin-top:8px;
font-size:22px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:24px;
margin-bottom:20px;
}

.card h3{
margin-bottom:15px;
font-size:18px;
}

input,select{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:16px;
background:#334155;
color:white;
font-size:14px;
}

input::placeholder{
color:#cbd5e1;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.02);
}

.transaction{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
background:#334155;
border-radius:18px;
margin-bottom:12px;
}

.transaction-left{
display:flex;
align-items:center;
gap:12px;
}

.icon{
width:45px;
height:45px;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.income-bg{
background:rgba(34,197,94,.2);
}

.expense-bg{
background:rgba(239,68,68,.2);
}

.transaction h4{
font-size:15px;
}

.transaction small{
color:#94a3b8;
}

.income{
color:#22c55e;
font-weight:600;
}

.expense{
color:#ef4444;
font-weight:600;
}

.empty{
text-align:center;
padding:25px;
color:#94a3b8;
}

.bottom-space{
height:80px;
}

.navbar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111827;
padding:15px;
display:flex;
justify-content:space-around;
border-top:1px solid #1f2937;
}

.nav-item{
text-align:center;
font-size:12px;
color:#94a3b8;
}

.active-nav{
color:#22c55e;
}

@media(max-width:500px){
body{
padding:15px;
}

.balance-card h2{
font-size:30px;
}
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<div>
<h1>💰 Finance</h1>
<small style="color:#94a3b8">Kelola keuangan lebih mudah</small>
</div>
<div class="profile">R</div>
</div>

<div class="balance-card">
<p>Total Saldo</p>
<h2 id="saldo">Rp 0</h2>
</div>

<div class="stats">
<div class="stat">
<small>Pemasukan</small>
<h3 id="income">Rp 0</h3>
</div>

<div class="stat">
<small>Pengeluaran</small>
<h3 id="expense">Rp 0</h3>
</div>
</div>

<div class="card">
<h3>➕ Tambah Transaksi</h3>

<input type="text" id="nama" placeholder="Nama transaksi">

<input type="number" id="jumlah" placeholder="Nominal">

<select id="jenis">
<option value="income">Pemasukan</option>
<option value="expense">Pengeluaran</option>
</select>

<select id="kategori">
<option>Makanan</option>
<option>Transportasi</option>
<option>Belanja</option>
<option>Tagihan</option>
<option>Hiburan</option>
<option>Lainnya</option>
</select>

<button onclick="tambah()">Simpan Transaksi</button>
</div>

<div class="card">
<h3>📋 Riwayat Transaksi</h3>

<div id="list"></div>
</div>

<div class="bottom-space"></div>

</div>

<div class="navbar">
<div class="nav-item active-nav">
🏠<br>Home
</div>
<div class="nav-item">
📊<br>Laporan
</div>
<div class="nav-item">
💳<br>Wallet
</div>
<div class="nav-item">
⚙️<br>Setting
</div>
</div>

<script>

let transaksi = JSON.parse(localStorage.getItem('transaksi')) || [];

function tambah(){

let nama = document.getElementById('nama').value;
let jumlah = document.getElementById('jumlah').value;
let jenis = document.getElementById('jenis').value;
let kategori = document.getElementById('kategori').value;

if(!nama || !jumlah){
alert('Lengkapi data');
return;
}

transaksi.unshift({
nama,
jumlah:Number(jumlah),
jenis,
kategori
});

localStorage.setItem('transaksi',JSON.stringify(transaksi));


document.getElementById('nama').value='';
document.getElementById('jumlah').value='';

render();
}

function render(){

let list = document.getElementById('list');
list.innerHTML='';

let totalIncome = 0;
let totalExpense = 0;

if(transaksi.length===0){
list.innerHTML=`<div class="empty">Belum ada transaksi</div>`;
}

transaksi.forEach((t)=>{

if(t.jenis==='income'){
totalIncome += t.jumlah;
}else{
totalExpense += t.jumlah;
}

list.innerHTML += `
<div class="transaction">

<div class="transaction-left">
<div class="icon ${t.jenis==='income' ? 'income-bg' : 'expense-bg'}">
${t.jenis==='income' ? '💰' : '💸'}
</div>

<div>
<h4>${t.nama}</h4>
<small>${t.kategori}</small>
</div>
</div>

<div class="${t.jenis}">
${t.jenis==='income' ? '+' : '-'} Rp ${t.jumlah.toLocaleString('id-ID')}
</div>

</div>
`;
});

let saldo = totalIncome-totalExpense;


document.getElementById('saldo').innerText =
'Rp ' + saldo.toLocaleString('id-ID');


document.getElementById('income').innerText =
'Rp ' + totalIncome.toLocaleString('id-ID');


document.getElementById('expense').innerText =
'Rp ' + totalExpense.toLocaleString('id-ID');
}

render();

</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js")
    .then(() => console.log("PWA aktif"))
    .catch(err => console.log(err));
}
</script>
<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();

  deferredPrompt = e;

  document.getElementById('installBtn').style.display = 'block';
});

document.getElementById('installBtn').addEventListener('click', async () => {

  if (!deferredPrompt) return;

  deferredPrompt.prompt();

  const { outcome } = await deferredPrompt.userChoice;

  console.log(outcome);

  deferredPrompt = null;

  document.getElementById('installBtn').style.display = 'none';
});
</script>
</body>
</html>
